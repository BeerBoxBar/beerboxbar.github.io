<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Beer Box Bar</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: #111;
  color: #fff;
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  padding: 30px 20px 40px; /* smaller top padding */
}

    .logo {
      max-width: 220px;
      width: 70%;
      height: auto;
      margin-bottom: 40px;
    }

    .link-btn {
      display: block;
      width: 100%;
      max-width: 340px;
      padding: 16px;
      margin: 12px 0;
      text-decoration: none;
      color: #111;
      background: #f5c542;
      border-radius: 10px;
      font-weight: 600;
      font-size: 16px;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      box-shadow: 0 6px 18px rgba(245,197,66,0.25);
    }

    .link-btn:active {
      transform: scale(0.98);
    }

    .secondary {
      background: transparent;
      color: #fff;
      border: 1px solid rgba(255,255,255,0.3);
      box-shadow: none;
    }

    .secondary:hover {
      background: rgba(255,255,255,0.08);
    }

    .footer {
      margin-top: 30px;
      font-size: 14px;
      opacity: 0.6;
    }
  </style>
</head>

<body>

  <!-- Logo -->
  <img src="logowhite.png" alt="Beer Box Bar logo" class="logo">

  <!-- Links -->
  <a href="https://beerboxbar.co.uk" target="_blank" rel="noopener" class="link-btn">
    Visit Website
  </a>

  <a href="https://instagram.com/beerboxuk" target="_blank" rel="noopener" class="link-btn">
    Instagram @beerboxuk
  </a>

  <a href="mailto:info@beerboxbar.co.uk" class="link-btn secondary">
    Email Us
  </a>

  <div class="footer">
    Mobile bar. Hampshire.
  </div>

</body>
</html>
