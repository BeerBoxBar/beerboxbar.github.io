
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beer Box | 10% Off</title>

<style>
    body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: linear-gradient(135deg, #111 0%, #1f1f1f 100%);
        color: white;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        text-align: center;
    }

    .card {
        max-width: 420px;
        padding: 40px 30px;
        background: rgba(255,255,255,0.05);
        backdrop-filter: blur(12px);
        border-radius: 20px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }

    h1 {
        font-size: 28px;
        margin-bottom: 15px;
        letter-spacing: 0.5px;
    }

    .highlight {
        color: #f5c542;
    }

    .steps {
        margin: 25px 0;
        font-size: 20px;
        line-height: 1.8;
        opacity: 0.9;
    }

    .arrow {
        opacity: 0.6;
    }

    .btn {
        display: block;
        margin-top: 25px;
        padding: 16px;
        background: linear-gradient(90deg, #f5c542, #ffda6b);
        color: #111;
        font-weight: bold;
        text-decoration: none;
        border-radius: 12px;
        font-size: 18px;
        transition: transform 0.2s ease, box-shadow 0.2s ease;
        box-shadow: 0 8px 20px rgba(245,197,66,0.3);
    }

    .btn:active {
        transform: scale(0.98);
    }

    .small {
        margin-top: 18px;
        font-size: 14px;
        opacity: 0.7;
    }
</style>
</head>

<body>

<div class="card">
    <h1>Follow us on Instagram<br><span class="highlight">Get 10% Off</span></h1>

    <div class="steps">
        Click below<br>
        <span class="arrow">↓</span><br>
        Follow our page<br>
        <span class="arrow">↓</span><br>
        Show our staff<br>
        <span class="arrow">↓</span><br>
        <strong>Enjoy 10% off your order</strong>
    </div>

    <a class="btn" href="https://instagram.com/beerboxuk" target="_blank">
        Follow @beerboxuk
    </a>

    <div class="small">
        Discount valid today only
    </div>
</div>

</body>
</html>
